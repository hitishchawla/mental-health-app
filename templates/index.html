<!DOCTYPE html>
<html>
<head>
    <title>Mental Health Prediction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: auto;
            padding: 20px;
            background: #f2f2f2;
            border-radius: 10px;
        }
        h2 {
            text-align: center;
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            box-sizing: border-box;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #4CAF50;
            border: none;
            color: white;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
        }
        #chat-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #4CAF50;
            color: white;
            font-size: 24px;
            padding: 15px;
            border-radius: 50%;
            cursor: pointer;
        }

        #chat-container {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 300px;
            background: white;
            border-radius: 10px;
            display: none;
            flex-direction: column;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.2);
        }

        #chat-header {
            background: #4CAF50;
            color: white;
            padding: 10px;
            font-weight: bold;
        }

        #chat-box {
        height: 200px;
        overflow-y: auto;
        padding: 10px;
        font-size: 14px;
        }

        #chat-input {
        width: 70%;
        padding: 5px;
        margin: 5px;
        border-radius: 5px;
        border: 1px solid #ccc;
        }

        #chat-container button {
        width: 25%;
        margin: 5px;
        }
        .user-msg {
            background: #4CAF50;
            color: white;
            padding: 8px;
            margin: 5px;
            border-radius: 10px;
            text-align: right;
        }
        .bot-msg {
            background: #e0e0e0;
            padding: 8px;
            margin: 5px;
            border-radius: 10px;
            text-align: left;
        }
    </style>
</head>
<body>

    <h2>Mental Health Prediction Form</h2>
    <form action="/predict" method="post">

        <label for="Gender">Gender</label>
        <select name="Gender" required>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>

        <label for="Age">Age</label>
        <input type="number" name="Age" min="15" max="80" required>

        <label for="Academic Pressure">Academic Pressure (1 to 5)</label>
        <input type="number" name="Academic Pressure" min="1" max="5" step="1" required>

        <label for="Study Satisfaction">Study Satisfaction (1 to 5)</label>
        <input type="number" name="Study Satisfaction" min="1" max="5" step="1" required>

        <label for="Sleep Duration">Sleep Duration (in hours)</label>
        <input type="number" name="Sleep Duration" min="1" max="24" step="1" required>

        <label for="Dietary Habits">Dietary Habits</label>
        <select name="Dietary Habits" required>
            <option value="Healthy">Healthy</option>
            <option value="Moderate">Moderate</option>
            <option value="Unhealthy">Unhealthy</option>
        </select>

        <label for="Suicidal_Thoughts">Suicidal Thoughts</label>
        <select name="Suicidal_Thoughts" required>
            <option value="0">No</option>
            <option value="1">Yes</option>
        </select>

        <label for="Financial Stress">Financial Stress (1 to 5)</label>
        <input type="number" name="Financial Stress" min="1" max="5" step="1" required>

        <label for="Family History of Mental Illness">Family History of Mental Illness</label>
        <select name="Family History of Mental Illness" required>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
        </select>

        <button type="submit">Predict Mental Health</button>
    </form>
<!-- Chatbot Button -->
    <div id="chat-button">💬</div>

<!-- Chat Window -->
    <div id="chat-container">
        <div id="chat-header">AI Mental Health Assistant</div>
        <div id="chat-box"></div>
        <input type="text" id="chat-input" placeholder="Type your message..." />
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        const chatButton = document.getElementById("chat-button");
        const chatContainer = document.getElementById("chat-container");
        const chatBox = document.getElementById("chat-box");

        chatButton.onclick = () => {
            chatContainer.style.display =
                chatContainer.style.display === "flex" ? "none" : "flex";
            if (chatBox.innerHTML === "") {
                chatBox.innerHTML += `<div class="bot-msg">Hi, I'm here to listen. How are you feeling today?</div>`;
            }
        };

        function sendMessage() {
            const input = document.getElementById("chat-input");
            const message = input.value;
            const typingMsg = `<div class="bot-msg" id="typing">Typing...</div>`;
            chatBox.innerHTML += typingMsg;
            chatBox.scrollTop = chatBox.scrollHeight;
            if (!message) return;

            chatBox.innerHTML += `<div class="user-msg"> ${message}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            fetch("/chat", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ message: message})
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById("typing").remove();

                if (data.intent === "crisis") {
                    chatBox.innerHTML += `<div class="bot-msg" style="background:#ffcccc; border-left:4px solid red;">${data.response}</div>`;
                } else {
                    chatBox.innerHTML += `<div class="bot-msg">${data.response}</div>`;
                }

                chatBox.scrollTop = chatBox.scrollHeight;
                });

            input.value = "";
        }
        document.getElementById("chat-input").addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                sendMessage();
            }
        });
    </script>
</body>
</html>
